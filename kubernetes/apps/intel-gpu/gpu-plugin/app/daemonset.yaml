---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: intel-gpu-plugin
  namespace: intel-gpu
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: intel-gpu-plugin
  namespace: intel-gpu
  labels:
    app.kubernetes.io/name: intel-gpu-plugin
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: intel-gpu-plugin
  template:
    metadata:
      labels:
        app.kubernetes.io/name: intel-gpu-plugin
    spec:
      serviceAccountName: intel-gpu-plugin
      priorityClassName: system-node-critical
      tolerations:
        - operator: Exists
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: gpu
                    operator: In
                    values:
                      - intel
              - matchExpressions:
                  - key: feature.node.kubernetes.io/pci-0300_8086.present
                    operator: In
                    values:
                      - "true"
      containers:
        - name: intel-gpu-plugin
          image: intel/intel-gpu-plugin:0.35.0
          args:
            - --logtostderr
            - --v=2
            - --shared-dev-num=4
          imagePullPolicy: IfNotPresent
          securityContext:
            privileged: true
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              memory: 128Mi
          volumeMounts:
            - name: devfs
              mountPath: /dev/dri
            - name: kubeletsockets
              mountPath: /var/lib/kubelet/device-plugins
            - name: cdi
              mountPath: /var/run/cdi
      volumes:
        - name: devfs
          hostPath:
            path: /dev/dri
            type: Directory
        - name: kubeletsockets
          hostPath:
            path: /var/lib/kubelet/device-plugins
            type: Directory
        - name: cdi
          hostPath:
            path: /var/run/cdi
            type: DirectoryOrCreate
