---
apiVersion: v1
kind: ConfigMap
metadata:
  name: gluetun-auth
  namespace: media
data:
  config.toml: |
    [[roles]]
    name = "gsp-port-sync"
    routes = ["GET /v1/openvpn/portforwarded"]
    auth = "apikey"
    apikey = "${GSP_API_KEY}"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    reloader.stakater.com/auto: "true"
    meta.helm.sh/release-namespace: media
  labels:
    app.kubernetes.io/controller: qbit
    app.kubernetes.io/instance: qbit
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: qbit
    helm.toolkit.fluxcd.io/name: qbit
    helm.toolkit.fluxcd.io/namespace: media
  name: qbit
  namespace: media
spec:
  progressDeadlineSeconds: 600
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app.kubernetes.io/controller: qbit
      app.kubernetes.io/instance: qbit
      app.kubernetes.io/name: qbit
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app.kubernetes.io/controller: qbit
        app.kubernetes.io/instance: qbit
        app.kubernetes.io/name: qbit
    spec:
      automountServiceAccountToken: true

      # Render the config.toml with the real API key before any container starts
      initContainers:
        - name: gluetun-auth-init
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              sed "s|\${GSP_API_KEY}|${GSP_API_KEY}|g" \
                /tmpl/config.toml > /gluetun-auth/config.toml
          env:
            - name: GSP_API_KEY
              valueFrom:
                secretKeyRef:
                  name: qbit-info
                  key: gsp-api-key
          volumeMounts:
            - mountPath: /tmpl
              name: gluetun-auth-tmpl
            - mountPath: /gluetun-auth
              name: gluetun-auth

      containers:

        # ------------------------------------------------------------------ #
        #  qBittorrent
        # ------------------------------------------------------------------ #
        - name: app
          image: ghcr.io/home-operations/qbittorrent:5.2.0@sha256:788796013c3da75f2dba568c5319975a5c41f555586dfd13987be4631181e00e
          imagePullPolicy: IfNotPresent
          env:
            - name: QBT_TORRENTING_PORT
              value: "25656"
            - name: QBT_WEBUI_PORT
              value: "10095"
            - name: TZ
              value: America/New_York
          livenessProbe:
            httpGet:
              path: /
              port: 10095
              scheme: HTTP
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
            successThreshold: 1
            timeoutSeconds: 1
          readinessProbe:
            httpGet:
              path: /
              port: 10095
              scheme: HTTP
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
            successThreshold: 1
            timeoutSeconds: 1
          resources:
            limits:
              memory: 4Gi
            requests:
              cpu: 100m
              memory: 200Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
          volumeMounts:
            - mountPath: /config
              name: config
            - mountPath: /library
              name: media
            - mountPath: /incomplete
              name: qbit-incomplete
            - mountPath: /tmp
              name: tmp

        # ------------------------------------------------------------------ #
        #  Gluetun — PIA OpenVPN
        # ------------------------------------------------------------------ #
        - name: gluetun
          image: ghcr.io/qdm12/gluetun:v3.40.0
          imagePullPolicy: IfNotPresent
          env:
            - name: VPN_SERVICE_PROVIDER
              value: private internet access
            - name: VPN_TYPE
              value: openvpn
            - name: OPENVPN_USER
              valueFrom:
                secretKeyRef:
                  name: qbit-info
                  key: pia-username
            - name: OPENVPN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: qbit-info
                  key: pia-password
            - name: SERVER_REGIONS
              value: "CA Montreal"
            - name: VPN_PORT_FORWARDING
              value: "on"
            - name: FIREWALL_INPUT_PORTS
              value: "10095"
            - name: FIREWALL_OUTBOUND_SUBNETS
              value: 10.96.0.0/16,10.69.0.0/16
            - name: TZ
              value: America/New_York
          resources:
            limits:
              memory: 4Gi
              squat.ai/tun: "1"
            requests:
              cpu: 100m
              memory: 100Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              add:
                - NET_ADMIN
                - NET_RAW
            readOnlyRootFilesystem: false
            runAsNonRoot: false
            runAsUser: 0
          volumeMounts:
            - mountPath: /gluetun/auth
              name: gluetun-auth
              readOnly: true

        # ------------------------------------------------------------------ #
        #  GSP — Gluetun→qBittorrent port sync sidecar
        # ------------------------------------------------------------------ #
        - name: port-forward-updater
          image: ghcr.io/linuxserver/baseimage-alpine:edge
          imagePullPolicy: IfNotPresent
          env:
            - name: DOCKER_MODS
              value: ghcr.io/t-anc/gsp-qbittorent-gluetun-sync-port-mod:main
            - name: GSP_GTN_API_KEY
              valueFrom:
                secretKeyRef:
                  name: qbit-info
                  key: gsp-api-key
            - name: GSP_GTN_ADDR
              value: http://localhost:8000
            - name: GSP_QBT_ADDR
              value: http://localhost:10095
            - name: GSP_SLEEP
              value: "60"
            - name: GSP_RETRY_DELAY
              value: "10"
            - name: GSP_MINIMAL_LOGS
              value: "false"
            - name: GSP_SKIP_INIT_CHECKS
              value: "true"   # not using lsio qbit image so skip conf file check
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              memory: 64Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            runAsNonRoot: false
            runAsUser: 0

      dnsPolicy: ClusterFirst
      enableServiceLinks: false
      restartPolicy: Always
      schedulerName: default-scheduler
      securityContext:
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        runAsGroup: 1000
        runAsNonRoot: true
        runAsUser: 1000
        seccompProfile:
          type: RuntimeDefault
      serviceAccountName: default
      terminationGracePeriodSeconds: 30

      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: qbit
        - name: media
          nfs:
            path: /PlexLib
            server: 192.168.86.9
        - name: qbit-incomplete
          persistentVolumeClaim:
            claimName: qbit-incomplete
        - name: tmp
          emptyDir: {}
        # ConfigMap template (read-only) — initContainer renders it with real key
        - name: gluetun-auth-tmpl
          configMap:
            name: gluetun-auth
        # Rendered config.toml written by initContainer, read by gluetun
        - name: gluetun-auth
          emptyDir: {}