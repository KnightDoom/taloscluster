apiVersion: v1
kind: Pod
metadata:
  name: intel-gpu-test
  namespace: default
spec:
  restartPolicy: Never
  containers:
    - name: intel-gpu-test
      image: ubuntu:22.04
      command: ["/bin/sh", "-c"]
      args:
        - |
          echo "===== /dev/dri contents ====="
          ls -la /dev/dri || echo "No /dev/dri found!"

          echo "===== Installing test tools ====="
          apt-get update -qq
          apt-get install -y -qq clinfo vainfo intel-opencl-icd intel-media-va-driver-non-free >/dev/null 2>&1

          echo "===== clinfo (OpenCL) ====="
          clinfo || echo "clinfo failed or not available"

          echo "===== vainfo (VA-API) ====="
          vainfo || echo "vainfo failed or not available"

          echo "===== Sleeping so you can exec in ====="
          sleep 3600
      resources:
        limits:
          gpu.intel.com/i915: 1
